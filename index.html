<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
}

.logo {
  font-size: 26px;
  color: gold;
  text-shadow: 0 0 20px gold;
}

.sub {
  color: lightgreen;
  font-size: 14px;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* DROPDOWN */
.dropdown-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

.arrow {
  transition: transform 0.3s ease;
}

.dropdown.open .arrow {
  transform: rotate(90deg);
}

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

.sub-link {
  color: lightgreen;
  margin: 8px 0;
  display: block;
}

.sub2-link {
  color: #9eff9e;
  margin-left: 20px;
  display: block;
}

/* HEADER */
header {
  text-align: center;
  font-size: 24px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.card {
  width: 85%;
  padding: 20px;
  border: 1px solid gold;
  border-radius: 10px;
  text-align: center;
}

/* MENU BUTTON (MATCH MAIN PAGE EXACTLY) */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo">Matthew's Bookmarks</div>
  <div class="sub">Premium Handmade Collection</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<a class="main-link" href="index.html">Home</a>

<div id="dropdown" class="dropdown">

  <div class="dropdown-header" onclick="toggleDropdown()">
    <span>Main Page</span>
    <span class="arrow">▶</span>
  </div>

  <div class="dropdown-content">
    <a class="sub-link" href="main.html">Main Page</a>
    <a class="sub-link" href="template.html">Templates</a>
    <a class="sub-link" href="gallery.html">Gallery</a>
    <a class="sub-link" href="custom.html">Custom</a>
    <a class="sub-link" href="reviews.html">Reviews</a>
    <a class="sub-link" href="cart.html">Cart</a>
    <a class="sub-link" href="about.html">About</a>
  </div>

</div>

</div>

<!-- MENU BUTTON (SAME STYLE AS MAIN) -->
<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<header>Matthew's Bookmarks</header>

<div class="container">
<div class="card">
<button onclick="location.href='main.html'">Start Shopping</button>
</div>
</div>

<script>

function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("menuBtn").classList.toggle("hidden");
}

function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("open");
}

</script>

</body>
</html>
