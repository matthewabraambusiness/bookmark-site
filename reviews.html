<!DOCTYPE html>
<html>
<head>
  <title>Reviews</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

header {
  text-align: center;
  font-size: 32px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 80px;
}

.form-box {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  padding: 15px;
  border: 2px solid gold;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-sizing: border-box;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
  box-sizing: border-box;
}

textarea {
  min-height: 100px;
  resize: none;
}

button {
  background: gold;
  border: none;
  padding: 12px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

/* CARD */
.card {
  width: 90%;
  max-width: 600px;
  margin: 15px auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid gold;
  border-radius: 10px;
  padding: 15px;
  box-sizing: border-box;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(255, 215, 0, 0.25);
}

.reply-box {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}

.reply-box input,
.reply-box button {
  width: 100%;
  box-sizing: border-box;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  transition: transform 0.2s ease, text-shadow 0.2s ease;
}

.menu a:hover {
  transform: translateX(5px) scale(1.05);
  text-shadow: 0 0 10px gold;
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* DROPDOWN HEADER FIXED */
.dropdown-header {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* FIXED */
  gap: 6px;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

.dropdown-header a {
  color: gold;
  text-decoration: none;
  flex: unset;
}

.arrow {
  transition: transform 0.3s ease;
  margin-left: 6px; /* FIXED */
}

.dropdown.open .arrow {
  transform: rotate(90deg);
}

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

.sub-link {
  color: lightgreen;
  display: block;
  margin: 8px 0;
  transition: transform 0.2s ease, text-shadow 0.2s ease;
}

.sub-link:hover {
  transform: translateX(5px) scale(1.05);
  text-shadow: 0 0 10px lightgreen;
}

/* MENU BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

  </style>
</head>

<body>

<header>Reviews</header>

<div id="menu" class="menu">

  <a class="main-link" href="index.html">Home</a>

  <div id="dropdown" class="dropdown">

    <div class="dropdown-header" onclick="toggleDropdown()">
      <a href="main.html" onclick="event.preventDefault()">Main Page</a>
      <span class="arrow">▶</span>
    </div>

    <div class="dropdown-content">
      <a class="sub-link" href="template.html">Templates</a>
      <a class="sub-link" href="gallery.html">Gallery</a>
      <a class="sub-link" href="custom.html">Custom</a>
      <a class="sub-link" href="reviews.html">Reviews</a>
      <a class="sub-link" href="cart.html">Cart</a>
      <a class="sub-link" href="about.html">About</a>
    </div>

  </div>

</div>

<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<div class="form-box">
  <input id="name" placeholder="Your Name">
  <select id="stars">
    <option value="5">★★★★★</option>
    <option value="4">★★★★</option>
    <option value="3">★★★</option>
    <option value="2">★★</option>
    <option value="1">★</option>
  </select>
  <textarea id="text" placeholder="Write Review"></textarea>
  <button onclick="addReview()">Post Review</button>
</div>

<div id="list"></div>

<script>

function toggleMenu(){ document.getElementById("menu").classList.toggle("open"); document.getElementById("menuBtn").classList.toggle("hidden"); }

document.addEventListener("click",function(e){
  const menu=document.getElementById("menu");
  const btn=document.getElementById("menuBtn");
  if(!menu.contains(e.target)&&!btn.contains(e.target)){
    menu.classList.remove("open");
    btn.classList.remove("hidden");
  }
});

function toggleDropdown(){
  document.getElementById("dropdown").classList.toggle("open");
}

const DB_URL="https://matthew-reviews-default-rtdb.firebaseio.com/reviews.json";
const list=document.getElementById("list");

let deviceId=localStorage.getItem("deviceId");
if(!deviceId){
  deviceId=crypto.randomUUID();
  localStorage.setItem("deviceId",deviceId);
}

async function loadReviews(){
  let res=await fetch(DB_URL);
  let data=await res.json();
  if(!Array.isArray(data)) data=[];
  render(data);
}

async function save(data){
  await fetch(DB_URL,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}

loadReviews();

</script>

</body>
</html>
