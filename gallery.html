<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  transition: 0.2s ease;
}

/* HOVER POP + GLOW */
.menu a:hover {
  transform: translateY(-4px);
  text-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
}

/* MENU BUTTON (MATCHED STYLE) */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* HEADER */
header {
  text-align: center;
  font-size: 20px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
}

/* CARD */
.card {
  width: 90%;
  padding: 14px;
  border: 1px solid gold;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
  transition: 0.25s ease;
}

/* POP EFFECT */
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(255, 215, 0, 0.25);
}

/* FLEX IMAGE WRAP */
.flex {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

/* IMAGES FIX */
.flex img {
  width: 100%;
  max-width: 120px;
  border-radius: 8px;
  transition: 0.25s ease;
}

/* IMAGE POP */
.flex img:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
}

/* INPUTS */
input {
  width: 90%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="menu" class="menu">
<a class="main-link" href="index.html">Home</a>
<a class="main-link" href="main.html">Main Page</a>
<a class="sub-link" href="template.html">Templates</a>
<a class="sub-link" href="gallery.html">Gallery</a>
<a class="sub-link" href="custom.html">Custom</a>
<a class="sub-link" href="reviews.html">Reviews</a>
<a class="sub-link" href="cart.html">Cart</a>
<a class="sub-link" href="about.html">About</a>
</div>

<!-- FIXED MENU BUTTON -->
<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<header>Gallery (30 EGP)</header>

<div class="container">

<div class="card flex">
<img src="images/bookmark3.jpeg">
<img src="images/bookmark4.jpeg">
<img src="images/bookmark5.jpeg">
<img src="images/bookmark6.jpeg">
<img src="images/bookmark7.jpeg">
</div>

<div class="card">
<input id="g1" placeholder="Bookmark Name">
<input id="g2" placeholder="Front Colour">
<input id="g3" placeholder="Name on the Back">
<input id="g4" placeholder="Back Colour Gradient">

<button onclick="
if(validate([g1,g2,g3,g4])){
addToCart(`Gallery:
${g1.value}
${g2.value}
${g3.value}
${g4.value}`)
}">
Add To Cart
</button>

</div>

</div>

<script src="script.js"></script>

<script>

/* MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("menuBtn").classList.toggle("hidden");
}

/* CLOSE MENU WHEN CLICKING OUTSIDE */
document.addEventListener("click", function(event) {
  const menu = document.getElementById("menu");
  const btn = document.getElementById("menuBtn");

  if (!menu.contains(event.target) && !btn.contains(event.target)) {
    menu.classList.remove("open");
    btn.classList.remove("hidden");
  }
});

</script>

</body>
</html>
