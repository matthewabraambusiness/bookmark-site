<!DOCTYPE html>
<html>
<head>
  <title>Reviews</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* HEADER */
header {
  text-align: center;
  font-size: 32px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 80px;
}

/* ================= INPUT BOX WRAPPER ================= */
.form-box {
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  padding: 15px;
  border: 2px solid gold;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;

  /* 🔥 IMPORTANT FIX */
  box-sizing: border-box;
}

/* INPUTS FIXED (NO OVERFLOW ANYMORE) */
input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;

  /* 🔥 THIS IS THE FIX */
  box-sizing: border-box;
}

/* TEXTAREA */
textarea {
  min-height: 100px;
  resize: none;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 12px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

/* MENU (UNCHANGED) */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* DROPDOWN */
.dropdown-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

.arrow {
  transition: transform 0.3s ease;
}

.dropdown.open .arrow {
  transform: rotate(90deg);
}

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

.sub-link {
  color: lightgreen;
  display: block;
  margin: 8px 0;
}

/* MENU BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* REVIEWS */
.card {
  width: 90%;
  max-width: 600px;
  margin: 15px auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid gold;
  border-radius: 10px;
  padding: 15px;
  font-size: 16px;
}

  </style>
</head>

<body>

<header>Reviews</header>

<div class="form-box">

  <input id="name" placeholder="Your Name">

  <select id="stars">
    <option value="5">★★★★★</option>
    <option value="4">★★★★</option>
    <option value="3">★★★</option>
    <option value="2">★★</option>
    <option value="1">★</option>
  </select>

  <textarea id="text" placeholder="Write Review"></textarea>

  <button onclick="addReview()">Post Review</button>

</div>

<div id="list"></div>

<script>
/* (YOUR JS UNCHANGED — NOT TOUCHING FIREBASE) */
const DB_URL = "https://matthew-reviews-default-rtdb.firebaseio.com/reviews.json";
const list = document.getElementById("list");

let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = crypto.randomUUID();
  localStorage.setItem("deviceId", deviceId);
}

async function loadReviews(){
  let res = await fetch(DB_URL);
  let data = await res.json();
  if(!Array.isArray(data)) data = [];
  render(data);
}

async function addReview(){
  const name = document.getElementById("name");
  const text = document.getElementById("text");
  const stars = document.getElementById("stars");

  if(!name.value.trim() || !text.value.trim()){
    alert("Please fill all fields");
    return;
  }

  let res = await fetch(DB_URL);
  let data = await res.json();
  if(!Array.isArray(data)) data = [];

  data.push({
    id: crypto.randomUUID(),
    deviceId,
    name: name.value,
    stars: stars.value,
    text: text.value,
    likes: 0,
    dislikes: 0,
    replies: [],
    createdAt: Date.now()
  });

  await fetch(DB_URL,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  name.value = "";
  text.value = "";
  loadReviews();
}

/* rest unchanged... */

function render(reviews){
  list.innerHTML = "";
  reviews.forEach((r,i)=>{
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${r.name}</b> ⭐${r.stars}<p>${r.text}</p>`;
    list.appendChild(div);
  });
}

loadReviews();
</script>

</body>
</html>
