<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<!-- MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
}

.logo {
  font-size: 42px;
  color: gold;
  text-shadow: 0 0 20px gold;
}

.sub {
  color: lightgreen;
}

/* MENU */
.menu {
  position: fixed;
  left: -220px;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
  margin-left: 10px;
}

.menu.open {
  left: 0;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* HEADER */
header {
  text-align: center;
  font-size: 40px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.card {
  padding: 20px;
  border: 1px solid gold;
  border-radius: 10px;
}

/* ANIMATION */
@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* MOBILE FIX */
@media (max-width: 768px) {
  header {
    font-size: 28px;
  }

  .logo {
    font-size: 28px;
  }

  .container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 90%;
  }

  button {
    width: 100%;
  }
}

</style>
</head>

<body>

<div id="intro">
  <div class="logo">Matthew's Bookmarks</div>
  <div class="sub">Premium Handmade Collection</div>
</div>

<div id="menu" class="menu">
<a class="main-link" href="index.html">Home</a>
<a class="main-link" href="main.html">Main Page</a>

<a class="sub-link" href="template.html">Templates</a>
<a class="sub-link" href="gallery.html">Gallery</a>
<a class="sub-link" href="custom.html">Custom</a>

<a class="sub-link" href="reviews.html">Reviews</a>
<a class="sub-link" href="cart.html">Cart</a>
<a class="sub-link" href="about.html">About</a>
</div>

<button onclick="toggleMenu()">☰</button>

<header>Matthew's Bookmarks</header>

<div class="container">
<div class="card">
<button onclick="location.href='main.html'">Start Shopping</button>
</div>
</div>

<script src="script.js"></script>
<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
