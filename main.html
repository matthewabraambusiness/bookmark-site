<!DOCTYPE html>
<html>
<head>
<title>Main</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL FIX */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
  margin-left: 10px;
}

.sub2-link {
  color: #9eff9e;
  margin-left: 20px;
}

/* HEADER */
header {
  text-align: center;
  font-size: 28px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
}

.card {
  width: 85%;
  padding: 20px;
  border: 1px solid gold;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
}

/* GREEN GRID LINKS */
.link-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 10px;
}

.link-grid a {
  color: lightgreen;
  text-decoration: none;
  font-size: 16px;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid rgba(144,255,144,0.2);
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* MENU BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* 🔥 SMALL MOBILE SHRINK (THIS IS THE CHANGE) */
@media (max-width: 768px) {

  header {
    font-size: 20px; /* was 22px */
  }

  .card {
    width: 90%; /* slightly tighter */
    padding: 14px; /* slightly smaller */
  }

  .link-grid a {
    font-size: 15px; /* tiny shrink */
  }
}

</style>
</head>

<body>

<div id="menu" class="menu">
<a class="main-link" href="index.html">Home</a>
<a class="main-link" href="main.html">Main Page ▼</a>

<a class="sub-link" href="template.html">Bookmarks</a>
<a class="sub-link" href="reviews.html">Reviews</a>
<a class="sub-link" href="cart.html">Cart</a>
<a class="sub-link" href="about.html">About</a>

<a class="sub2-link" href="template.html">Templates</a>
<a class="sub2-link" href="gallery.html">Gallery</a>
<a class="sub2-link" href="custom.html">Custom</a>
</div>

<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<header>Matthew's Bookmarks</header>

<div class="container">

<div class="card">
<h2>Where A Piece Of Paper Turns Into Your Craziest Ideas</h2>
<p style="color:lightgreen; font-size:20px; margin-top:10px;">
Premium handmade bookmarks • custom designs • creative art pieces
</p>
</div>

<div class="card">
<div class="link-grid">
<a href="template.html">Templates</a>
<a href="gallery.html">Gallery</a>
<a href="custom.html">Custom</a>
<a href="reviews.html">Reviews</a>
<a href="cart.html">Cart</a>
<a href="about.html">About</a>
</div>
</div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("menuBtn").classList.toggle("hidden");
}
</script>

</body>
</html>
