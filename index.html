<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* HARD RESET FOR OVERFLOW ISSUES */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
}

.logo {
  font-size: 26px;
  color: gold;
  text-shadow: 0 0 20px gold;
}

.sub {
  color: lightgreen;
  font-size: 14px;
}

/* MENU (IMPORTANT FIX HERE) */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
  margin-left: 10px;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* HEADER */
header {
  text-align: center;
  font-size: 24px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.card {
  padding: 20px;
  border: 1px solid gold;
  border-radius: 10px;
}

/* ANIMATION */
@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

</style>
</head>

<body>

<div id="intro">
  <div class="logo">Matthew's Bookmarks</div>
  <div class="sub">Premium Handmade Collection</div>
</div>

<div id="menu" class="menu">
<a class="main-link" href="index.html">Home</a>
<a class="main-link" href="main.html">Main Page</a>
<a class="sub-link" href="template.html">Templates</a>
<a class="sub-link" href="gallery.html">Gallery</a>
<a class="sub-link" href="custom.html">Custom</a>
<a class="sub-link" href="reviews.html">Reviews</a>
<a class="sub-link" href="cart.html">Cart</a>
<a class="sub-link" href="about.html">About</a>
</div>

<button onclick="toggleMenu()">☰</button>

<header>Matthew's Bookmarks</header>

<div class="container">
<div class="card">
<button onclick="location.href='main.html'">Start Shopping</button>
</div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
