<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<!-- MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
}

.logo {
  font-size: 42px;
  color: gold;
  text-shadow: 0 0 20px gold;
}

.sub {
  color: lightgreen;
  font-size: 16px;
}

/* MENU */
.menu {
  position: fixed;
  left: -220px;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
  margin-left: 10px;
}

.menu.open {
  left: 0;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
