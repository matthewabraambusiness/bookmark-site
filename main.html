<!DOCTYPE html>
<html>
<head>
<title>Main</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL EDGE FIX */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
}

.main-link {
  color: gold;
  font-weight: bold;
}

.sub-link {
  color: lightgreen;
  margin-left: 10px;
}

.sub2-link {
  color: #9eff9e;
  margin-left: 20px;
}

/* HEADER */
header {
  text-align: center;
  font-size: 28px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
}

.card {
  width: 85%;
  padding: 20px;
  border: 1px solid gold;
  border-radius: 10px;
  margin-bottom: 20px;
}

/* BUTTON */
button {
  background: gold;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* 🔥 HAMBURGER BUTTON (FIXED + MORE VISIBLE) */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

/* 3 LINES */
.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

/* MOBILE FIX (REAL FIX) */
@media (max-width: 768px) {

  header {
    font-size: 22px;
  }

  .card {
    width: 92%;
    padding: 15px;
  }

  .menu {
    width: 200px;
  }
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="menu">

<a class="main-link" href="main.html">Main Page ▼</a>

<a class="sub-link" href="cart.html">Cart</a>
<a class="sub-link" href="about.html">About</a>

<a class="sub2-link" href="template.html">Templates</a>
<a class="sub2-link" href="gallery.html">Gallery</a>
<a class="sub2-link" href="custom.html">Custom</a>
</div>

<!-- HAMBURGER BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<header>Matthew's Bookmarks</header>

<div class="container">

<div class="card">
<h2>Where A Piece Of Paper Turns Into Your Craziest Ideas</h2>
</div>

<div class="card">

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
