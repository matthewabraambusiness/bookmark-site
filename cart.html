<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open { transform: translateX(0); }

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  transition: 0.2s ease;
}

.menu a:hover {
  transform: translateY(-4px);
  text-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.main-link { color: gold; font-weight: bold; }
.sub-link { color: lightgreen; }

/* DROPDOWN */
.dropdown-header {
  display: flex;
  align-items: center;
  gap: 6px;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

.arrow { transition: 0.3s; }

.dropdown.open .arrow { transform: rotate(90deg); }

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

/* MENU BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* PAGE */
header {
  text-align: center;
  font-size: 20px;
  color: gold;
  text-shadow: 0 0 15px gold;
  margin-top: 20px;
}

.container {
  display: flex;
  justify-content: center;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
}

button.whatsapp {
  background: gold;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

button.whatsapp.active {
  background: #25d366;
  color: white;
}

.empty {
  color: white;
  opacity: 0.7;
  margin-top: 20px;
}

/* 🆕 DELETE BUTTON STYLE */
.del {
  background: red;
  color: white;
  border: none;
  padding: 6px 10px;
  margin-left: 10px;
  border-radius: 6px;
  cursor: pointer;
}

</style>
</head>

<body onload="loadCart()">

<div id="menu" class="menu">

<a class="main-link" href="index.html">Home</a>

<div id="dropdown" class="dropdown">
  <div class="dropdown-header" onclick="toggleDropdown()">
    <span onclick="location.href='main.html'">Main Page</span>
    <span class="arrow">▶</span>
  </div>

  <div class="dropdown-content">
    <a class="sub-link" href="template.html">Templates</a>
    <a class="sub-link" href="gallery.html">Gallery</a>
    <a class="sub-link" href="custom.html">Custom</a>
    <a class="sub-link" href="reviews.html">Reviews</a>
    <a class="sub-link" href="cart.html">Cart</a>
    <a class="sub-link" href="about.html">About</a>
  </div>
</div>

</div>

<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<header>Cart</header>

<div class="container" id="cartList"></div>

<div class="container" id="checkoutContainer">
<button id="checkoutBtn" class="whatsapp" onclick="askName()">
Finish Purchase via WhatsApp
</button>
</div>

<script>

let cart = [];

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("menuBtn").classList.toggle("hidden");
}

function toggleDropdown(){
  document.getElementById("dropdown").classList.toggle("open");
}

document.addEventListener("click", function(event){
  const menu = document.getElementById("menu");
  const btn = document.getElementById("menuBtn");

  if(!menu.contains(event.target) && !btn.contains(event.target)){
    menu.classList.remove("open");
    btn.classList.remove("hidden");
  }
});

/* LOAD CART */
function loadCart(){
  cart = JSON.parse(localStorage.getItem("cart")) || [];

  const list = document.getElementById("cartList");
  const btn = document.getElementById("checkoutBtn");
  const container = document.getElementById("checkoutContainer");

  list.innerHTML = "";

  if(cart.length === 0){
    list.innerHTML = "<div class='empty'>Cart Is Empty!</div>";
    container.style.display = "none";
    return;
  }

  container.style.display = "flex";
  btn.classList.add("active");

  cart.forEach((item, i)=>{
    let div = document.createElement("div");

    div.innerHTML = `
      • ${item}
      <button class="del" onclick="deleteItem(${i})">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* 🆕 DELETE ITEM */
function deleteItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

/* ASK NAME */
function askName(){
  let name = prompt("Enter your name:");
  if(!name || !name.trim()) return;

  continueCheckout(name.trim());
}

/* CONTINUE + AUTO CLEAR CART */
function continueCheckout(name){

  let msg = "🛒 NEW ORDER\n\n";
  msg += "Name: " + name + "\n\n";

  cart.forEach((item,i)=>{
    msg += "ORDER " + (i+1) + ":\n";
    msg += "━━━━━━━━━━━━━━\n";
    msg += item + "\n";
    msg += "━━━━━━━━━━━━━━\n\n";
  });

  msg += "Ready to be sent to this number (01280389893)";

  let url = "https://wa.me/201280389893?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");

  /* 🆕 CLEAR CART AFTER SENDING */
  localStorage.removeItem("cart");
  cart = [];
  loadCart();
}

</script>

</body>
</html>
