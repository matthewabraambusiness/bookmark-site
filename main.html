<!DOCTYPE html>
<html>
<head>
<title>Main Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
}

/* GLOW BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  width: 600px;
  height: 600px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 60%);
  filter: blur(40px);
  z-index: 0;
}

/* TITLE */
h1 {
  text-align: center;
  margin-top: 80px;
  color: gold;
  text-shadow: 0 0 20px gold;
}

/* MENU SAME STYLE */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.3s;
  z-index: 1000;
}

.menu.open { transform: translateX(0); }

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  color: lightgreen;
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 1100;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
  margin: 2px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid gold;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(255,215,0,0.25);
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="menu">

  <a class="main-link" href="index.html">Home</a>
  <a href="main.html">Main Page</a>
  <a href="template.html">Templates</a>
  <a href="gallery.html">Gallery</a>
  <a href="custom.html">Custom</a>
  <a href="reviews.html">Reviews</a>
  <a href="cart.html">Cart</a>
  <a href="about.html">About</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<h1>Main Dashboard</h1>

<div class="grid">

  <div class="card">Templates</div>
  <div class="card">Gallery</div>
  <div class="card">Custom Orders</div>
  <div class="card">Reviews</div>
  <div class="card">Cart</div>
  <div class="card">About</div>

</div>

<script>

function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

</script>

</body>
</html>
