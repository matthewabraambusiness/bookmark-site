<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
  pointer-events: none;
}

.logo {
  font-size: 42px;
  color: gold;
  text-shadow: 0 0 25px gold;
}

.sub {
  color: lightgreen;
  font-size: 18px;
  margin-top: 10px;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

/* MENU LINKS + POP EFFECT */
.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  transition: 0.2s ease;
}

.menu a:hover {
  transform: translateY(-4px);
  text-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* FIXED DROPDOWN */
.dropdown-header {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

/* MAKE WHOLE MAIN PAGE CLICKABLE */
.dropdown-header a {
  color: gold;
  text-decoration: none;
}

/* arrow tight next to text */
.arrow {
  transition: transform 0.3s ease;
  margin-left: 4px;
}

.dropdown.open .arrow {
  transform: rotate(90deg);
}

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

.sub-link {
  color: lightgreen;
  margin: 8px 0;
  display: block;
  transition: 0.2s ease;
}

.sub-link:hover {
  transform: translateX(5px);
  text-shadow: 0 0 10px rgba(144,255,144,0.6);
}

/* MENU BUTTON */
.menu-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  width: 45px;
  height: 40px;
  background: #111;
  border: 2px solid gold;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.menu-btn div {
  width: 22px;
  height: 2px;
  background: gold;
}

.menu-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

/* CENTER */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 65vh;
  gap: 25px;
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 15px;
}

/* RESPONSIVE TITLE FIX */
.hero-title {
  font-size: clamp(26px, 6vw, 42px);
  color: gold;
  text-shadow: 0 0 25px gold;
}

/* BUTTON */
.button-wrapper {
  padding: 6px;
  border: 2px solid gold;
  border-radius: 14px;
}

button {
  background: gold;
  border: 2px solid #b38f00;
  padding: 16px 30px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  color: black;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo">Matthew's Bookmarks</div>
  <div class="sub">Premium Handmade Collection</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<a class="main-link" href="index.html">Home</a>

<div id="dropdown" class="dropdown">

  <div class="dropdown-header">
    <a href="main.html">Main Page</a>
    <span class="arrow">▶</span>
  </div>

  <div class="dropdown-content">
    <a class="sub-link" href="template.html">Templates</a>
    <a class="sub-link" href="gallery.html">Gallery</a>
    <a class="sub-link" href="custom.html">Custom</a>
    <a class="sub-link" href="reviews.html">Reviews</a>
    <a class="sub-link" href="cart.html">Cart</a>
    <a class="sub-link" href="about.html">About</a>
  </div>

</div>

</div>

<!-- MENU BUTTON -->
<div id="menuBtn" class="menu-btn" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<!-- MAIN -->
<div class="center">

  <div class="hero-title">
    Matthew's Bookmarks
  </div>

  <div class="button-wrapper">
    <button onclick="location.href='main.html'">
      Start Shopping
    </button>
  </div>

</div>

<script>

function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("menuBtn").classList.toggle("hidden");
}

/* dropdown fix */
document.querySelector(".dropdown-header").addEventListener("click", function () {
  document.getElementById("dropdown").classList.toggle("open");
});

document.addEventListener("click", function(event) {
  const menu = document.getElementById("menu");
  const btn = document.getElementById("menuBtn");

  if (!menu.contains(event.target) && !btn.contains(event.target)) {
    menu.classList.remove("open");
    btn.classList.remove("hidden");
  }
});

</script>

</body>
</html>
