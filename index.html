<!DOCTYPE html>
<html>
<head>
<title>Matthew's Bookmarks</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Arial, sans-serif;
  color: white;
  -webkit-text-size-adjust: 100%;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeOut 1.5s ease 2.5s forwards;
  pointer-events: none;

  /* FIX ONLY: PERFECT CENTERING */
  text-align: center;
  gap: 10px;
}

.logo {
  font-size: 42px;
  color: gold;
  text-shadow: 0 0 25px gold;
}

.sub {
  color: lightgreen;
  font-size: 18px;
  margin-top: 10px;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* MENU */
.menu {
  position: fixed;
  left: 0;
  top: 0;
  width: 220px;
  height: 100%;
  background: #111;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
}

.menu.open {
  transform: translateX(0);
}

/* MENU LINKS + POP EFFECT */
.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  transition: 0.2s ease;
}

.menu a:hover {
  transform: translateY(-4px);
  text-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.main-link {
  color: gold;
  font-weight: bold;
}

/* FIXED DROPDOWN */
.dropdown-header {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  color: gold;
  font-weight: bold;
  cursor: pointer;
  margin: 10px 0;
}

/* MAKE WHOLE MAIN PAGE CLICKABLE */
.dropdown-header a {
  color: gold;
  text-decoration: none;
}

/* arrow tight next to text */
.arrow {
  transition: transform 0.3s ease;
  margin-left: 4px;
}

.dropdown.open .arrow {
  transform: rotate(90deg);
}

.dropdown-content {
  display: none;
  margin-left: 10px;
}

.dropdown.open .dropdown-content {
  display: block;
}

.sub-link {
  color: lightgreen;
  margin: 8px 0;
  display: block;
  transition: 0.2s ease;
}

.sub-link:hover {
  transform: translateX(5px);
  text-shadow: 0 0 10px rgba(144,255,144,0.6);
}
